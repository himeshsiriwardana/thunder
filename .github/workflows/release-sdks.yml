# Entrypoint workflow for releasing SDKs.
# Each selected SDK runs in its own parallel job and delegates to
# .github/actions/release-sdk with the sdk name as input.

name: 🧩 Release SDKs

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

      sdk_browser:
        description: '@thunderid/browser'
        required: false
        type: boolean
        default: false

      sdk_express:
        description: '@thunderid/express'
        required: false
        type: boolean
        default: false

      sdk_javascript:
        description: '@thunderid/javascript'
        required: false
        type: boolean
        default: false

      sdk_nextjs:
        description: '@thunderid/nextjs'
        required: false
        type: boolean
        default: false

      sdk_node:
        description: '@thunderid/node'
        required: false
        type: boolean
        default: false

      sdk_nuxt:
        description: '@thunderid/nuxt'
        required: false
        type: boolean
        default: false

      sdk_react:
        description: '@thunderid/react'
        required: false
        type: boolean
        default: false

      sdk_react_router:
        description: '@thunderid/react-router'
        required: false
        type: boolean
        default: false

      sdk_tanstack_router:
        description: '@thunderid/tanstack-router'
        required: false
        type: boolean
        default: false

      sdk_vue:
        description: '@thunderid/vue'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  RELEASE_GIT_USER_NAME: "thunderid-automation-bot"
  RELEASE_GIT_USER_EMAIL: "thunderid-bot@wso2.com"
  NODE_VERSION: "lts/*"
  PNPM_VERSION: "latest"

jobs:
  release-browser:
    name: 🌐 Release @thunderid/browser
    if: ${{ github.event.inputs.sdk_browser == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.THUNDER_AUTOMATION_BOT }}

      - name: 🚀 Release
        uses: ./.github/actions/release-sdk/npm
        with:
          sdk: browser
          bump-type: ${{ github.event.inputs.bump_type }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          git-user-name: ${{ env.RELEASE_GIT_USER_NAME }}
          git-user-email: ${{ env.RELEASE_GIT_USER_EMAIL }}
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

  release-express:
    name: 🚂 Release @thunderid/express
    if: ${{ github.event.inputs.sdk_express == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.THUNDER_AUTOMATION_BOT }}

      - name: 🚀 Release
        uses: ./.github/actions/release-sdk/npm
        with:
          sdk: express
          bump-type: ${{ github.event.inputs.bump_type }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          git-user-name: ${{ env.RELEASE_GIT_USER_NAME }}
          git-user-email: ${{ env.RELEASE_GIT_USER_EMAIL }}
          node-version: ${{ env.NODE_VERSION }}

  release-javascript:
    name: 📜 Release @thunderid/javascript
    if: ${{ github.event.inputs.sdk_javascript == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.THUNDER_AUTOMATION_BOT }}

      - name: 🚀 Release
        uses: ./.github/actions/release-sdk/npm
        with:
          sdk: javascript
          bump-type: ${{ github.event.inputs.bump_type }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          git-user-name: ${{ env.RELEASE_GIT_USER_NAME }}
          git-user-email: ${{ env.RELEASE_GIT_USER_EMAIL }}
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

  release-nextjs:
    name: ▲ Release @thunderid/nextjs
    if: ${{ github.event.inputs.sdk_nextjs == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.THUNDER_AUTOMATION_BOT }}

      - name: 🚀 Release
        uses: ./.github/actions/release-sdk/npm
        with:
          sdk: nextjs
          bump-type: ${{ github.event.inputs.bump_type }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          git-user-name: ${{ env.RELEASE_GIT_USER_NAME }}
          git-user-email: ${{ env.RELEASE_GIT_USER_EMAIL }}
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

  release-node:
    name: 🟢 Release @thunderid/node
    if: ${{ github.event.inputs.sdk_node == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.THUNDER_AUTOMATION_BOT }}

      - name: 🚀 Release
        uses: ./.github/actions/release-sdk/npm
        with:
          sdk: node
          bump-type: ${{ github.event.inputs.bump_type }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          git-user-name: ${{ env.RELEASE_GIT_USER_NAME }}
          git-user-email: ${{ env.RELEASE_GIT_USER_EMAIL }}
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

  release-nuxt:
    name: 💚 Release @thunderid/nuxt
    if: ${{ github.event.inputs.sdk_nuxt == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.THUNDER_AUTOMATION_BOT }}

      - name: 🚀 Release
        uses: ./.github/actions/release-sdk/npm
        with:
          sdk: nuxt
          bump-type: ${{ github.event.inputs.bump_type }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          git-user-name: ${{ env.RELEASE_GIT_USER_NAME }}
          git-user-email: ${{ env.RELEASE_GIT_USER_EMAIL }}
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

  release-react:
    name: ⚛️ Release @thunderid/react
    if: ${{ github.event.inputs.sdk_react == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.THUNDER_AUTOMATION_BOT }}

      - name: 🚀 Release
        uses: ./.github/actions/release-sdk/npm
        with:
          sdk: react
          bump-type: ${{ github.event.inputs.bump_type }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          git-user-name: ${{ env.RELEASE_GIT_USER_NAME }}
          git-user-email: ${{ env.RELEASE_GIT_USER_EMAIL }}
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

  release-react-router:
    name: 🔀 Release @thunderid/react-router
    if: ${{ github.event.inputs.sdk_react_router == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.THUNDER_AUTOMATION_BOT }}

      - name: 🚀 Release
        uses: ./.github/actions/release-sdk/npm
        with:
          sdk: react-router
          bump-type: ${{ github.event.inputs.bump_type }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          git-user-name: ${{ env.RELEASE_GIT_USER_NAME }}
          git-user-email: ${{ env.RELEASE_GIT_USER_EMAIL }}
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

  release-tanstack-router:
    name: 🔱 Release @thunderid/tanstack-router
    if: ${{ github.event.inputs.sdk_tanstack_router == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.THUNDER_AUTOMATION_BOT }}

      - name: 🚀 Release
        uses: ./.github/actions/release-sdk/npm
        with:
          sdk: tanstack-router
          bump-type: ${{ github.event.inputs.bump_type }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          git-user-name: ${{ env.RELEASE_GIT_USER_NAME }}
          git-user-email: ${{ env.RELEASE_GIT_USER_EMAIL }}
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}

  release-vue:
    name: 🟩 Release @thunderid/vue
    if: ${{ github.event.inputs.sdk_vue == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ secrets.THUNDER_AUTOMATION_BOT }}

      - name: 🚀 Release
        uses: ./.github/actions/release-sdk/npm
        with:
          sdk: vue
          bump-type: ${{ github.event.inputs.bump_type }}
          npm-token: ${{ secrets.NPM_TOKEN }}
          git-user-name: ${{ env.RELEASE_GIT_USER_NAME }}
          git-user-email: ${{ env.RELEASE_GIT_USER_EMAIL }}
          node-version: ${{ env.NODE_VERSION }}
          pnpm-version: ${{ env.PNPM_VERSION }}
