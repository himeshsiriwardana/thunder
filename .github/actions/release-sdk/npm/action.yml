name: 'Release ThunderID SDK'
description: 'Bumps the version, builds, tests, and publishes a ThunderID SDK package to npm'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: 'lts/*'
  pnpm-version:
    description: 'pnpm version to use'
    required: false
    default: 'latest'
  sdk:
    description: 'SDK directory name under sdks/ (e.g. browser, react, node)'
    required: true
  bump-type:
    description: 'Semver bump type: major, minor, or patch'
    required: true
  npm-token:
    description: 'NPM authentication token'
    required: true
  git-user-name:
    description: 'Git committer name'
    required: false
    default: 'thunderid-automation-bot'
  git-user-email:
    description: 'Git committer email'
    required: false
    default: 'thunderid-bot@wso2.com'
  tag-convention:
    description: 'Git tag format. Use {sdk} and {version} as placeholders (e.g. "{sdk}/v{version}")'
    required: false
    default: '{sdk}/v{version}'

runs:
  using: composite
  steps:
    - name: 📦 Set up pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      with:
        version: ${{ inputs.pnpm-version }}

    - name: ⚙️ Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: 'https://registry.npmjs.org'
        cache: 'pnpm'

    - name: 📦 Install Dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: 🏷️ Bump Version
      id: bump
      shell: bash
      run: |
        cd sdks/${{ inputs.sdk }}
        VERSION=$(pnpm version ${{ inputs.bump-type }} --no-git-tag-version)
        echo "version=${VERSION#v}" >> $GITHUB_OUTPUT
        echo "✅ Bumped @thunderid/${{ inputs.sdk }} to ${VERSION#v}"

    - name: 🔨 Build
      shell: bash
      run: |
        cd sdks/${{ inputs.sdk }}
        pnpm build

    - name: 🧪 Test
      shell: bash
      run: |
        cd sdks/${{ inputs.sdk }}
        pnpm test --run

    - name: 📤 Commit and Tag Release
      shell: bash
      run: |
        git config --local user.name "${{ inputs.git-user-name }}"
        git config --local user.email "${{ inputs.git-user-email }}"
        git add sdks/${{ inputs.sdk }}/package.json
        git diff --cached --quiet || git commit -m "[Release] @thunderid/${{ inputs.sdk }}@${{ steps.bump.outputs.version }}"
        git pull --rebase origin ${{ github.ref_name }}
        git push origin HEAD:${{ github.ref_name }}
        TAG=$(echo "${{ inputs.tag-convention }}" | sed 's/{sdk}/${{ inputs.sdk }}/g; s/{version}/${{ steps.bump.outputs.version }}/g')
        git tag "$TAG"
        git push origin "$TAG"

    - name: 📦 Publish to npm
      shell: bash
      run: |
        cd sdks/${{ inputs.sdk }}
        pnpm publish --no-git-checks --access public
      env:
        NODE_AUTH_TOKEN: ${{ inputs.npm-token }}
